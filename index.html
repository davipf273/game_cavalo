<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Corrida de Cavalos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1> Corrida de Cavalos </h1>

    <div id="controls-info">
        <div class="ctrl-box">
            <span class="player-label">Jogador 1</span>
            <span>W</span> / <span>S</span> — Mover
        </div>
        <div class="ctrl-box">
            <span class="player-label">Jogador 2</span>
            <span>↑</span> / <span>↓</span> — Mover
        </div>
    </div>

    <div style="position:relative">
        <canvas id="des" width="1200" height="620"></canvas>
        <div id="overlay" class="hidden">
            <h2 id="overlay-title">Fim de Corrida!</h2>
            <p id="overlay-sub"></p>
            <button id="restart-btn" onclick="reiniciar()">Correr Novamente</button>
        </div>
    </div>

    <script src="./models/Cavalos.js"></script>
    <script src="game.js"></script>
</body>
</html>
